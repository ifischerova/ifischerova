# Netlify build configuration.
# The site is an Eleventy + Tailwind static build: `npm run build` compiles the
# CSS and generates the static site into `_site`, which Netlify publishes.

[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  # Node 18: required to stay below 20 for @netlify/plugin-lighthouse,
  # and comfortably sufficient for Eleventy 1.x + Tailwind 3.x.
  NODE_VERSION = "18"
